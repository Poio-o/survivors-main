<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hunters vs Preys</title>
    <style>
        body { font-family: monospace; background: #111; color: white; }
        canvas { background: black; display: block; margin-top: 10px; }
        button { margin-right: 5px; }
        #optionsPanel { margin-top: 10px; }
    </style>
</head>
<body>

<button id="start">Start</button>
<button id="restart">Restart</button>
<button id="options">Options</button>

<div id="optionsPanel" style="display:none;">
    Width (cells): <input id="optWidth" type="number" value="30"><br>
    Height (cells): <input id="optHeight" type="number" value="20"><br>
    Hunters: <input id="optHunters" type="number" value="4"><br>
    Preys: <input id="optPreys" type="number" value="10"><br>
    Obstacles: <input id="optObstacles" type="number" value="25"><br>
    Speed (ms): <input id="optSpeed" type="number" value="200"><br>
    <button id="apply">Apply</button>
</div>


<canvas id="game"></canvas>

<script type="module" src="main.js"></script>
</body>
</html>
